<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bridal Vault | Contact</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<meta property="og:title" content="Bridal Vault | Contact">
<meta property="og:description" content="Contact Bridal Vault to schedule your bridal consultation.">
<meta property="og:image" content="https://bridal-vault.netlify.app/preview.png">

<style>

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:'Inter',sans-serif;
background:#f8f5f0;
color:#1c1c1c;
line-height:1.8;
overflow-x:hidden;
position:relative;
}

/* WATERMARK */
body::before{
content:"";
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:60vw;
height:60vw;
max-width:700px;
max-height:700px;
background:url('BV.jpeg') center/contain no-repeat;
opacity:0.07;
pointer-events:none;
z-index:0;
filter:grayscale(100%);
}

/* HEADER */

header{
position:absolute;
top:0;
left:0;
width:100%;
padding:35px 6%;
display:flex;
justify-content:space-between;
align-items:center;
z-index:10;
}

.logo{
font-family:'Playfair Display',serif;
font-size:18px;
letter-spacing:8px;
font-weight:500;
color:#c2a14a;
}

nav{
display:flex;
gap:30px;
}

nav a{
text-decoration:none;
color:#333;
font-size:12px;
letter-spacing:2px;
text-transform:uppercase;
transition:0.3s;
}

nav a:hover{
color:#c2a14a;
}

/* HERO */

.hero{
height:70vh;
background:url('studio1.jpeg') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
padding:120px 20px;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(248,245,240,0.6);
}

.hero-content{
position:relative;
z-index:2;
}

.hero h1{
font-family:'Playfair Display',serif;
font-size:clamp(40px,6vw,70px);
font-weight:400;
letter-spacing:2px;
}

/* CONTACT SECTION */

.section{
padding:160px 10%;
max-width:900px;
margin:auto;
position:relative;
z-index:2;
text-align:center;
}

.section h2{
font-family:'Playfair Display',serif;
font-size:36px;
margin-bottom:50px;
}

.contact-info{
margin-bottom:60px;
line-height:2;
}

.contact-info a{
color:#c2a14a;
text-decoration:none;
}

/* FORM */

form{
display:flex;
flex-direction:column;
gap:20px;
}

input,textarea{
padding:16px;
border:1px solid #e0d8c8;
background:#fff;
font-family:'Inter';
font-size:14px;
}

textarea{
min-height:140px;
resize:none;
}

button{
background:#c2a14a;
color:white;
padding:16px;
border:none;
letter-spacing:2px;
text-transform:uppercase;
font-size:12px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#a88834;
}

/* FOOTER */

footer{
background:#ece6da;
padding:80px 10%;
text-align:center;
font-size:13px;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:40px;
right:40px;
background:#c2a14a;
color:white;
padding:16px 28px;
text-decoration:none;
letter-spacing:1px;
font-size:12px;
z-index:9999;
}

.whatsapp:hover{
background:#a88834;
}

/* MOBILE */

@media(max-width:768px){

header{
padding:25px 6%;
}

.logo{
letter-spacing:4px;
font-size:15px;
}

nav{
gap:15px;
}

.section{
padding:100px 8%;
}

.hero{
height:55vh;
}

}

</style>
</head>

<body>

<header>
<div class="logo">BRIDAL VAULT</div>
<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="booking.html">Book</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<section class="hero">
<div class="hero-content">
<h1>Contact</h1>
</div>
</section>

<section class="section">

<h2>Get In Touch</h2>

<div class="contact-info">
<p>Phone: 066 224 3626</p>
<p>Email: bridalvault@gmail.com</p>
<p>
<a href="https://www.instagram.com/bridalvault/">Instagram</a> |
<a href="https://www.facebook.com/BridalVault/">Facebook</a>
</p>
</div>

<form name="contact" method="POST" data-netlify="true">
<input type="hidden" name="form-name" value="contact">

<input type="text" name="name" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email Address" required>

<textarea name="message" placeholder="Your message"></textarea>

<button type="submit">Send Message</button>

</form>

</section>

<footer>
<p>© 2026 Bridal Vault. All Rights Reserved.</p>
</footer>

<a href="https://wa.me/27662243626" class="whatsapp">WhatsApp</a>

</body>
</html>
