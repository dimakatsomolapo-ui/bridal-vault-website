<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bridal Vault | Contact</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<meta property="og:title" content="Bridal Vault | Contact">
<meta property="og:description" content="Contact Bridal Vault to enquire about bridal alterations and fittings.">
<meta property="og:image" content="https://bridal-vault.netlify.app/preview.png">
<meta property="og:url" content="https://bridal-vault.netlify.app/contact.html">
<meta property="og:type" content="website">

<style>

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:'Inter',sans-serif;
background:#f8f5f0;
color:#1c1c1c;
line-height:1.8;
overflow-x:hidden;
position:relative;
animation:pageFade 1.2s ease;
}

@keyframes pageFade{
from{opacity:0;}
to{opacity:1;}
}

/* WATERMARK */

body::before{
content:"";
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:60vw;
height:60vw;
max-width:700px;
max-height:700px;
background:url('BV.jpeg') center/contain no-repeat;
opacity:0.07;
pointer-events:none;
z-index:0;
filter:grayscale(100%);
}

/* HEADER */

header{
position:absolute;
top:0;
left:0;
width:100%;
padding:35px 6%;
display:flex;
justify-content:space-between;
align-items:center;
z-index:10;
}

.logo{
font-family:'Playfair Display',serif;
font-size:18px;
letter-spacing:8px;
background:linear-gradient(90deg,#c2a14a,#fff3c9,#c2a14a);
background-size:200%;
-webkit-background-clip:text;
color:transparent;
animation:goldShimmer 6s linear infinite;
}

@keyframes goldShimmer{
to{background-position:200% center;}
}

nav{
display:flex;
gap:30px;
}

nav a{
text-decoration:none;
color:#333;
font-size:12px;
letter-spacing:2px;
text-transform:uppercase;
}

nav a:hover{
color:#c2a14a;
}

/* HERO */

.hero{
height:65vh;
background:url('studio1.jpeg') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
overflow:hidden;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(248,245,240,0.6);
}

.hero h1{
position:relative;
z-index:3;
font-family:'Playfair Display',serif;
font-size:clamp(40px,6vw,70px);
font-weight:400;
letter-spacing:2px;
}

/* PETALS */

.petals{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:2;
overflow:hidden;
}

.petal{
position:absolute;
top:-40px;
width:18px;
height:18px;
background:radial-gradient(circle,#f5cbd6,#e8a6b2);
border-radius:60% 40% 60% 40%;
opacity:.85;
animation:fall linear forwards;
}

@keyframes fall{

0%{
transform:translateY(-50px) rotate(0deg);
opacity:0;
}

10%{
opacity:1;
}

100%{
transform:translateY(110vh) rotate(360deg);
opacity:.8;
}

}

/* PARTICLES */

.particles span{
position:absolute;
width:4px;
height:4px;
background:#ffffff;
border-radius:50%;
opacity:.6;
animation:floatLight 6s linear infinite;
}

@keyframes floatLight{

0%{
transform:translateY(0);
opacity:0;
}

50%{
opacity:.8;
}

100%{
transform:translateY(-200px);
opacity:0;
}

}

/* CONTACT SECTION */

.section{
padding:140px 10%;
max-width:800px;
margin:auto;
position:relative;
z-index:2;
text-align:center;
}

.section h2{
font-family:'Playfair Display',serif;
font-size:34px;
margin-bottom:40px;
}

.contact-details{
margin-bottom:50px;
line-height:2;
}

.contact-details a{
color:#c2a14a;
text-decoration:none;
}

/* FORM */

form{
display:flex;
flex-direction:column;
gap:20px;
}

input, textarea{
padding:16px;
border:1px solid #e2dccf;
background:#ffffff;
font-family:'Inter';
font-size:14px;
transition:.3s;
}

input:focus, textarea:focus{
outline:none;
border-color:#c2a14a;
box-shadow:0 0 0 2px rgba(194,161,74,0.1);
}

textarea{
min-height:140px;
resize:none;
}

button{
background:#c2a14a;
color:white;
padding:16px;
border:none;
letter-spacing:2px;
text-transform:uppercase;
font-size:12px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#a88834;
transform:translateY(-2px);
}

/* FOOTER */

footer{
background:#ece6da;
padding:80px 10%;
text-align:center;
font-size:13px;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:40px;
right:40px;
background:#c2a14a;
color:white;
padding:16px 28px;
text-decoration:none;
letter-spacing:1px;
font-size:12px;
z-index:9999;
}

.whatsapp:hover{
background:#a88834;
}

/* MOBILE */

@media(max-width:768px){

header{
padding:25px 6%;
}

.logo{
letter-spacing:4px;
font-size:15px;
}

nav{
gap:15px;
}

.hero{
height:50vh;
}

.section{
padding:100px 8%;
}

}

</style>
</head>

<body>

<header>

<div class="logo">BRIDAL VAULT</div>

<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="booking.html">Book</a>
<a href="contact.html">Contact</a>
</nav>

</header>

<section class="hero">

<div class="petals" id="petals"></div>
<div class="particles" id="particles"></div>

<h1>Contact</h1>

</section>

<section class="section">

<h2>Get In Touch</h2>

<div class="contact-details">
<p>Phone: 066 224 3626</p>
<p>Email: bridalvault@gmail.com</p>
<p>
<a href="https://www.instagram.com/bridalvault/">Instagram</a> |
<a href="https://www.facebook.com/BridalVault/">Facebook</a>
</p>
</div>

<form name="contact" method="POST" data-netlify="true" action="/thank-you.html">

<input type="hidden" name="form-name" value="contact">

<input type="text" name="name" placeholder="Full Name" required>

<input type="email" name="email" placeholder="Email Address" required>

<textarea name="message" placeholder="Your Message"></textarea>

<button type="submit">Send Message</button>

</form>

</section>

<footer>
<p>© 2026 Bridal Vault. All Rights Reserved.</p>
<p>Designed with elegance by Dimakatso's Professional Touch</p>
</footer>

<a href="https://wa.me/27662243626" class="whatsapp">WhatsApp</a>

<script>

/* PETALS */

const container=document.getElementById("petals");

function createPetal(){

const petal=document.createElement("div");
petal.classList.add("petal");

petal.style.left=Math.random()*100+"vw";
petal.style.animationDuration=(Math.random()*4+4)+"s";

container.appendChild(petal);

setTimeout(()=>{
petal.remove();
},8000);

}

let petalInterval=setInterval(createPetal,300);

setTimeout(()=>{
clearInterval(petalInterval);
},8000);


/* PARTICLES */

const particles=document.getElementById("particles");

for(let i=0;i<25;i++){

const dot=document.createElement("span");

dot.style.left=Math.random()*100+"%";
dot.style.top=Math.random()*100+"%";
dot.style.animationDuration=(Math.random()*5+3)+"s";

particles.appendChild(dot);

}

</script>

</body>
</html>
