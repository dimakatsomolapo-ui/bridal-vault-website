<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bridal Vault | Secure Booking</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:'Inter',sans-serif;
background:#f8f5f0;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:#ffffff;
padding:60px;
width:90%;
max-width:600px;
box-shadow:0 20px 60px rgba(0,0,0,0.05);
}

h1{
font-family:'Playfair Display',serif;
font-weight:500;
text-align:center;
margin-bottom:30px;
}

input,select,textarea{
width:100%;
padding:15px;
margin-bottom:20px;
border:1px solid #e5dfd3;
font-family:'Inter';
}

button{
width:100%;
padding:18px;
background:#c6a75e;
color:white;
border:none;
letter-spacing:2px;
text-transform:uppercase;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#b5954e;
}
</style>
</head>

<body>

<div class="container">

<h1>Secure Your Private Consultation</h1>

<form name="booking" method="POST" data-netlify="true" action="/payment-redirect.html">

<input type="hidden" name="form-name" value="booking" />

<input type="text" name="fullName" placeholder="Full Name" required>
<input type="tel" name="phone" placeholder="Phone Number" required>
<input type="email" name="email" placeholder="Email Address" required>

<select name="service" required>
<option value="" disabled selected>Select Service</option>
<option value="Bridal Consultation R150">Bridal Consultation - R150</option>
</select>

<input type="date" name="date" required>
<input type="time" name="time" required>

<textarea name="notes" placeholder="Additional notes"></textarea>

<button type="submit">Secure Appointment – R150</button>
<p style="font-size:12px;color:#777;text-align:center;margin-top:15px;">
Appointments are confirmed upon successful payment. Secure transactions powered by iKhokha.
</p>
</form>

</div>

</body>
</html>
