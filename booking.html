<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bridal Vault | Private Fitting Request</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:'Inter',sans-serif;
background:#f6f2ea;
color:#1c1c1c;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:40px 20px;
}

.container{
background:#ffffff;
padding:80px 60px;
width:100%;
max-width:620px;
box-shadow:0 25px 80px rgba(0,0,0,0.05);
}

h1{
font-family:'Playfair Display',serif;
font-weight:400;
font-size:32px;
text-align:center;
margin-bottom:20px;
letter-spacing:1px;
}

.subtitle{
text-align:center;
font-size:13px;
letter-spacing:2px;
text-transform:uppercase;
opacity:0.6;
margin-bottom:50px;
}

label{
display:block;
margin-bottom:8px;
font-size:12px;
letter-spacing:1px;
text-transform:uppercase;
opacity:0.7;
}

input, select, textarea{
width:100%;
padding:16px;
margin-bottom:25px;
border:1px solid #e5dfd3;
font-family:'Inter';
font-size:14px;
background:#faf8f3;
transition:0.3s;
}

input:focus, select:focus, textarea:focus{
outline:none;
border-color:#c2a14a;
background:#ffffff;
}

textarea{
min-height:120px;
resize:none;
}

button{
width:100%;
padding:18px;
background:#c2a14a;
color:white;
border:none;
letter-spacing:3px;
text-transform:uppercase;
font-size:11px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#a88834;
}

.note{
text-align:center;
font-size:12px;
opacity:0.6;
margin-top:20px;
line-height:1.6;
}

@media(max-width:600px){
.container{
padding:60px 30px;
}
}
</style>
</head>

<body>

<div class="container">

<h1>Request a Private Fitting</h1>
<p class="subtitle">Appointments are limited & confirmed upon secure payment</p>

<form name="booking" method="POST" data-netlify="true" action="/payment-redirect.html">

<input type="hidden" name="form-name" value="booking" />

<label>Full Name</label>
<input type="text" name="fullName" required>

<label>Phone Number</label>
<input type="tel" name="phone" required>

<label>Email Address</label>
<input type="email" name="email" required>

<label>Select Service</label>
<select name="service" required>
<option value="" disabled selected>Select</option>
<option value="Private Bridal Consultation - R150">
Private Bridal Consultation — R150
</option>
</select>

<label>Preferred Date</label>
<input type="date" name="date" required>

<label>Preferred Time</label>
<input type="time" name="time" required>

<label>Notes (Optional)</label>
<textarea name="notes"></textarea>

<button type="submit">Proceed to Secure Payment</button>

</form>

<p class="note">
A non-refundable consultation fee secures your private fitting slot.  
Secure payment powered by iKhokha.
</p>

</div>

</body>
</html>
