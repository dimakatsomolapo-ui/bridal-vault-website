<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bridal Vault | Private Fitting Request</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:'Inter',sans-serif;
background:#f6f2ea;
color:#1c1c1c;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:40px 20px;
overflow-x:hidden;
animation:pageFade 1.2s ease;
}

@keyframes pageFade{
from{opacity:0;}
to{opacity:1;}
}

/* HEADER */

.header{
position:absolute;
top:30px;
left:50%;
transform:translateX(-50%);
font-family:'Playfair Display',serif;
letter-spacing:8px;
font-size:18px;
background:linear-gradient(90deg,#c2a14a,#fff3c9,#c2a14a);
background-size:200%;
-webkit-background-clip:text;
color:transparent;
animation:goldShimmer 6s linear infinite;
}

@keyframes goldShimmer{
to{background-position:200% center;}
}

/* PETALS */

.petals{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:1;
overflow:hidden;
}

.petal{
position:absolute;
top:-40px;
width:18px;
height:18px;
background:radial-gradient(circle,#f5cbd6,#e8a6b2);
border-radius:60% 40% 60% 40%;
opacity:.85;
animation:fall linear forwards;
}

@keyframes fall{

0%{
transform:translateY(-50px) rotate(0deg);
opacity:0;
}

10%{
opacity:1;
}

100%{
transform:translateY(110vh) rotate(360deg);
opacity:.8;
}

}

/* PARTICLES */

.particles span{
position:absolute;
width:4px;
height:4px;
background:#ffffff;
border-radius:50%;
opacity:.6;
animation:floatLight 6s linear infinite;
}

@keyframes floatLight{

0%{
transform:translateY(0);
opacity:0;
}

50%{
opacity:.8;
}

100%{
transform:translateY(-200px);
opacity:0;
}

}

/* FORM CONTAINER */

.container{
background:#ffffff;
padding:80px 60px;
width:100%;
max-width:620px;
box-shadow:0 25px 80px rgba(0,0,0,0.05);
position:relative;
z-index:2;
transition:0.4s;
}

.container:hover{
box-shadow:0 35px 120px rgba(0,0,0,0.08);
}

/* TITLES */

h1{
font-family:'Playfair Display',serif;
font-weight:400;
font-size:32px;
text-align:center;
margin-bottom:20px;
letter-spacing:1px;
}

.subtitle{
text-align:center;
font-size:13px;
letter-spacing:2px;
text-transform:uppercase;
opacity:0.6;
margin-bottom:50px;
}

/* LABELS */

label{
display:block;
margin-bottom:8px;
font-size:12px;
letter-spacing:1px;
text-transform:uppercase;
opacity:0.7;
}

/* INPUTS */

input, select, textarea{
width:100%;
padding:16px;
margin-bottom:25px;
border:1px solid #e5dfd3;
font-family:'Inter';
font-size:14px;
background:#faf8f3;
transition:0.3s;
}

input:focus, select:focus, textarea:focus{
outline:none;
border-color:#c2a14a;
background:#ffffff;
box-shadow:0 0 0 2px rgba(194,161,74,0.1);
}

textarea{
min-height:120px;
resize:none;
}

/* BUTTON */

button{
width:100%;
padding:18px;
background:#c2a14a;
color:white;
border:none;
letter-spacing:3px;
text-transform:uppercase;
font-size:11px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#a88834;
transform:translateY(-2px);
}

/* NOTE */

.note{
text-align:center;
font-size:12px;
opacity:0.6;
margin-top:20px;
line-height:1.6;
}

/* MOBILE */

@media(max-width:600px){

.container{
padding:60px 30px;
}

}

</style>
</head>

<body>

<div class="header">BRIDAL VAULT</div>

<div class="petals" id="petals"></div>
<div class="particles" id="particles"></div>

<div class="container">

<h1>Request a Private Fitting</h1>
<p class="subtitle">Appointments are limited & confirmed upon secure payment</p>

<form name="booking" method="POST" data-netlify="true" action="/payment-redirect.html">

<input type="hidden" name="form-name" value="booking">
<input type="hidden" name="subject" value="New Bridal Consultation Booking — Bridal Vault">

<label>Full Name</label>
<input type="text" name="fullName" required>

<label>Phone Number</label>
<input type="tel" name="phone" required>

<label>Email Address</label>
<input type="email" name="email" required>

<label>Select Service</label>
<select name="service" required>
<option value="" disabled selected>Select</option>
<option value="Private Bridal Consultation - R150">
Private Bridal Consultation — R150
</option>
</select>

<label>Preferred Date</label>
<input type="date" name="date" required>

<label>Preferred Time</label>
<input type="time" name="time" required>

<label>Notes (Optional)</label>
<textarea name="notes"></textarea>

<button type="submit">Proceed to Secure Payment</button>

</form>

<p class="note">
A non-refundable consultation fee secures your private fitting slot.  
Secure payment powered by iKhokha.
</p>

</div>

<script>

/* PETALS */

const container=document.getElementById("petals");

function createPetal(){

const petal=document.createElement("div");
petal.classList.add("petal");

petal.style.left=Math.random()*100+"vw";
petal.style.animationDuration=(Math.random()*4+4)+"s";

container.appendChild(petal);

setTimeout(()=>{
petal.remove();
},8000);

}

let petalInterval=setInterval(createPetal,300);

setTimeout(()=>{
clearInterval(petalInterval);
},8000);


/* PARTICLES */

const particles=document.getElementById("particles");

for(let i=0;i<20;i++){

const dot=document.createElement("span");

dot.style.left=Math.random()*100+"%";
dot.style.top=Math.random()*100+"%";
dot.style.animationDuration=(Math.random()*5+3)+"s";

particles.appendChild(dot);

}

</script>

</body>
</html>
