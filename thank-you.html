<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You | Bridal Vault</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:'Inter',sans-serif;
background:#f8f5f0;
color:#1c1c1c;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
text-align:center;
padding:40px;
position:relative;
}

/* WATERMARK */

body::before{
content:"";
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:60vw;
height:60vw;
max-width:650px;
max-height:650px;
background:url('BV.jpeg') center/contain no-repeat;
opacity:0.06;
pointer-events:none;
z-index:0;
}

/* CONTAINER */

.container{
background:#ffffff;
padding:80px 60px;
max-width:520px;
width:100%;
box-shadow:0 25px 80px rgba(0,0,0,0.05);
position:relative;
z-index:2;
}

h1{
font-family:'Playfair Display',serif;
font-weight:400;
font-size:36px;
margin-bottom:20px;
letter-spacing:1px;
}

p{
font-size:15px;
opacity:0.8;
line-height:1.7;
margin-bottom:40px;
}

/* BUTTON */

.button{
display:inline-block;
background:#c2a14a;
color:white;
padding:14px 36px;
text-decoration:none;
font-size:12px;
letter-spacing:2px;
text-transform:uppercase;
transition:0.3s;
}

.button:hover{
background:#a88834;
}

/* MOBILE */

@media(max-width:600px){

.container{
padding:60px 35px;
}

h1{
font-size:28px;
}

}

</style>
</head>

<body>

<div class="container">

<h1>Thank You</h1>

<p>
Your message has been received.  
We will respond to your enquiry as soon as possible.
</p>

<a href="index.html" class="button">Return Home</a>

</div>

</body>
</html>
